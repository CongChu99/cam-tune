name: cam_tune_mobile
description: "CamTune Mobile App — Field-First MVP for camera settings & lens recommendations."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.5.4

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.8

  # State management
  # TODO(cam-tune-mau.5): bump to ^3.0.0 once Dart SDK ≥ 3.6.0 is available (Riverpod 3.x requires Dart ≥ 3.6.0)
  flutter_riverpod: ^2.6.1
  riverpod_annotation: ^2.6.1

  # Offline storage
  hive_flutter: ^1.1.0

  # HTTP
  dio: ^5.7.0
  dio_cache_interceptor: ^3.5.0

  # Auth
  flutter_appauth: ^8.0.1
  flutter_secure_storage: ^9.2.2

  # Routing
  go_router: ^14.6.2

  # Location
  geolocator: ^13.0.1

  # Connectivity
  connectivity_plus: ^6.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter

  flutter_lints: ^4.0.0

  # Code generation
  hive_generator: ^2.0.1
  # TODO(cam-tune-mau.5): bump to ^4.0.0 once Dart SDK ≥ 3.6.0 is available (Riverpod 3.x requires Dart ≥ 3.6.0)
  riverpod_generator: ^2.6.3
  build_runner: ^2.4.13

flutter:
  uses-material-design: true
